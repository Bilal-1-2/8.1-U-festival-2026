<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <title>U festival</title>
  </head>
  <body>
    <header>
      <div class="brand-container">
        <img
          src="assets\images\logo\logo_white.svg"
          alt=""
          class="brand-logo"
        />
        <p class="brand-title">FESTIVAL</p>
      </div>
      <div class="header-controls">
        <img src="assets\images\night-mode.png" alt="" class="theme-toggle" />
        <img
          src="assets\images/Flag_of_the_Netherlands.svg.png"
          alt=""
          class="language-flag"
        />
      </div>
    </header>

    <main>
      <section class="screen" data-screen="home"><p>Hi (Home)</p></section>
      <section class="screen" data-screen="info"><p>Hi (Info)</p></section>
      <section class="screen" data-screen="lineup"><p>Hi (Lineup)</p></section>
      <section class="screen" data-screen="map"><p>Hi (Map)</p></section>
    </main>
    <footer>
      <button class="footer-btns">
        <img
          src="assets/images/icons/home.svg"
          class="filter-black"
          data-target="home"
        />
        <p>Home</p>
      </button>
      <button class="footer-btns">
        <img
          src="assets/images/icons/info.svg"
          class="filter-black"
          data-target="info"
        />
        <p>Info</p>
      </button>
      <button class="footer-btns">
        <img
          src="assets/images/icons/lineup.svg"
          class="filter-black"
          data-target="lineup"
        />
        <p>Lineup</p>
      </button>
      <button class="footer-btns">
        <img
          src="assets/images/icons/map.svg"
          class="filter-black"
          data-target="map"
        />
        <p>Map</p>
      </button>
    </footer>

    <script src="assets/js/script.js"></script>
  </body>
</html>
